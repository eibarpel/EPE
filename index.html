<!DOCTYPE html>
<html>
<head>
  <title>EKD - Pelotia</title>

  <style>
    .container {
      display: flex;
      gap: 0px; /* espacio entre iframes */
    }

    .iframe-small {
      width: 170px;
      height: 540px;
      border: none;
    }

    .iframe-big {
      flex: 1; /* ocupa el resto del espacio */
      height: 540px;
      border: none;
    }
  </style>
</head>

<body>
  <h1> - - - - Kartelera - - - -</h1>

<script src="https://www.gstatic.com/charts/loader.js"></script>
<div id="table"></div>
<script>
google.charts.load('current', {packages:['table']});
google.charts.setOnLoadCallback(() => {
  const query = new google.visualization.Query(
    'https://docs.google.com/spreadsheets/d/1HyvLkTxXXVVeZoGiUb3PDHtDbZXf2CgTl3ou9klrThE/gviz/tq?gid=1506814058'
  );

  query.send(res => {
    const table = new google.visualization.Table(document.getElementById('table'));
    table.draw(res.getDataTable());
  });
});
</script>
</body>
</html>
